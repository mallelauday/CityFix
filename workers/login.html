<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CityFix - Worker Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h1>CityFix</h1>
        <h2>Worker Login</h2>

        <form id="workerLoginForm">
            <label for="workerMobile">Mobile Number</label>
            <input type="tel" id="workerMobile" placeholder="Enter 10-digit mobile" pattern="[0-9]{10}" required>

            <label for="workerPassword">Password</label>
            <input type="password" id="workerPassword" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <p>
            <a href="../index.html">← Back to Home</a>
        </p>
    </div>

    <script src="worker-auth.js"></script>
</body>

</html>
