<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CityFix - Worker Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header>
    <h1>CityFix - Worker Panel</h1>
    <nav>
        <a href="assigned-work.html">Assigned Work</a>
        <a href="login.html" id="logoutBtn">Logout</a>
    </nav>
</header>

<section class="dashboard-cards">
    <div class="card total">
        <h2>Total Tasks</h2>
        <p id="totalTasks">0</p>
    </div>

    <div class="card pending">
        <h2>Pending Tasks</h2>
        <p id="pendingTasks">0</p>
    </div>

    <div class="card completed">
        <h2>Completed Tasks</h2>
        <p id="completedTasks">0</p>
    </div>
</section>

<section class="welcome">
    <h2>Welcome, Worker!</h2>
    <p>Here you can view your assigned tasks and submit updates once the work is completed.</p>
</section>

<script src="worker.js"></script>
</body>
</html>
