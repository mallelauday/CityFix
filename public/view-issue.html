<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CityFix - View Issues</title>
    <link rel="stylesheet" href="view-issue.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>CityFix</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="report.html">Report Issue</a>
            <a href="track.html">Track Issue</a>
        </nav>
    </header>

    <!-- Issues Table Section -->
    <section class="issues-section">
        <h2>Reported Issues</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="issueTable">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 CityFix | Clean & Green Technology</p>
    </footer>

    <!-- JS -->
    <script>
        // Load issues from localStorage
        const issues = JSON.parse(localStorage.getItem("issues")) || [];
        const table = document.getElementById("issueTable");

        issues.forEach(issue => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${issue.id}</td>
                <td>${issue.title}</td>
                <td>${issue.category}</td>
                <td>${issue.location}</td>
                <td class="${issue.status.toLowerCase()}">${issue.status}</td>
            `;
            table.appendChild(row);
        });
    </script>

</body>

</html>
