<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CityFix - Report Issue</title>
    <link rel="stylesheet" href="report.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>CityFix</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="view-issue.html">View Issues</a>
            <a href="track.html">Track Issue</a>
        </nav>
    </header>

    <!-- Report Form Section -->
    <section class="report-section">
        <div class="report-container">
            <h2>Report a Civic Issue</h2>

            <form id="reportForm">

                <div class="input-group">
                    <input type="text" id="title" placeholder=" ">
                    <label for="title">Issue Title</label>
                </div>

                <div class="input-group">
                    <select id="category" >
                        <option value="" disabled selected hidden></option>
                        <option>Pothole</option>
                        <option>Streetlight</option>
                        <option>Garbage</option>
                        <option>Water Leakage</option>
                    </select>
                    <label for="category">Category</label>
                </div>

                <div class="input-group">
                    <input type="text" id="location" placeholder=" " required>
                    <label for="location">Location</label>
                    <button type="button" onclick="getLocation()" style="margin-top:5px;">Detect Location</button>
                </div>

                <div class="input-group">
                    <textarea id="description" rows="4" placeholder=" " maxlength="200" ></textarea>
                    <label for="description">Description</label>
                </div>

                <div class="input-group">
                    <input type="file" id="image" accept="image/*" capture="environment" required>
                    <label for="image">Upload Image</label>
                </div>

                <button type="submit">Submit Issue</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 CityFix | Clean & Green Technology</p>
    </footer>

    <!-- JS -->
    <script src="public.js"></script>
    <script>
        // Detect location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude.toFixed(5);
                    const lon = position.coords.longitude.toFixed(5);
                    document.getElementById('location').value = `Lat: ${lat}, Lon: ${lon}`;
                }, () => {
                    alert("Location access denied.");
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        // Save report to localStorage
        document.getElementById("reportForm").addEventListener("submit", function(e){
            e.preventDefault();

            const title = document.getElementById("title").value;
            const category = document.getElementById("category").value;
            const location = document.getElementById("location").value;
            const description = document.getElementById("description").value;
            const image = document.getElementById("image").files[0] ? document.getElementById("image").files[0].name : "";

            const issue = {
                id: Date.now(),
                title,
                category,
                location,
                description,
                image,
                status: "Pending"
            };

            let issues = JSON.parse(localStorage.getItem("issues")) || [];
            issues.push(issue);
            localStorage.setItem("issues", JSON.stringify(issues));

            alert("Issue Submitted Successfully!");
            window.location.href = "view-issue.html";
        });
    </script>
</body>
</html>
