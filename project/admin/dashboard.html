<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CityFix - Admin Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>CityFix - Admin Panel</h1>
    <nav>
        <a href="../home.html">Home</a>
        <a href="login.html">Logout</a>
    </nav>
</header>

<!-- Dashboard Cards -->
<section class="dashboard">
    <div class="card">
        <h2>Total Issues</h2>
        <p id="totalIssues">0</p>
    </div>

    <div class="card">
        <h2>Pending Issues</h2>
        <p id="pendingIssues">0</p>
    </div>

    <div class="card">
        <h2>Resolved Issues</h2>
        <p id="resolvedIssues">0</p>
    </div>
</section>

<!-- Manage Issues Table -->
<section class="issues">
    <h2>Manage Reported Issues</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Issue</th>
                <th>Location</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="issuesTable">
            <!-- Data will be populated from backend -->
        </tbody>
    </table>
</section>

</body>
</html>
