<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CityFix - Assigned Work</title>
    <link rel="stylesheet" href="assigned-work.css">
</head>
<body>

<header>
    <h1>CityFix - Worker Panel</h1>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="login.html" id="logoutBtn">Logout</a>
    </nav>
</header>

<section class="tasks-section">
    <h2>Your Assigned Tasks</h2>

    <table id="tasksTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Issue</th>
                <th>Location</th>
                <th>Status</th>
                <th>Update Work</th>
            </tr>
        </thead>
        <tbody>
            <!-- Tasks will be populated here via backend -->
        </tbody>
    </table>
</section>

<!-- Modal for submitting work -->
<div class="modal" id="workModal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <h3>Submit Work Update</h3>
        <form id="workForm">
            <input type="hidden" id="taskId">
            <label for="remarks">Remarks:</label>
            <textarea id="remarks" rows="4" placeholder="Describe the work done..." required></textarea>

            <label for="image">Upload Image:</label>
            <input type="file" id="image" accept="image/*">

            <button type="submit">Submit</button>
        </form>
    </div>
</div>

<script src="assigned-work.js"></script>
</body>
</html>
