<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CityFix - Track Issue</title>
    <link rel="stylesheet" href="track.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>CityFix</h1>
        <nav>
            <a href="../home.html">Home</a>
            <a href="report.html">Report Issue</a>
            <a href="view-issue.html">View Issues</a>
        </nav>
    </header>

    <!-- Track Form Section -->
    <section class="track-section">
        <div class="track-container">
            <h2>Track Your Issue</h2>

            <form id="trackForm">
                <div class="input-group">
                    <input type="text" id="trackId" placeholder=" " required>
                    <label for="trackId">Enter Issue ID</label>
                </div>

                <button type="submit">Track</button>
            </form>

            <div id="statusMessage" class="status-message"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 CityFix | Clean & Green Technology</p>
    </footer>

    <!-- JS -->
    <script>
        document.getElementById("trackForm").addEventListener("submit", function(e){
            e.preventDefault();

            const id = document.getElementById("trackId").value;
            const issues = JSON.parse(localStorage.getItem("issues")) || [];
            const found = issues.find(issue => issue.id == id);

            const statusDiv = document.getElementById("statusMessage");

            if(found){
                statusDiv.textContent = `Status: ${found.status}`;
                statusDiv.style.color = found.status === "Resolved" ? "#22c55e" : "#f59e0b";
                statusDiv.classList.add("fade-in");
            } else {
                statusDiv.textContent = "Issue Not Found!";
                statusDiv.style.color = "#ef4444";
                statusDiv.classList.add("fade-in");
            }
        });
    </script>
</body>
</html>
